services:

  postgres:
    image: postgres:15-alpine
    container_name: fight-club-postgres
    environment:
      POSTGRES_USER: fightclub
      POSTGRES_PASSWORD: fightclub
      POSTGRES_DB: fightclub
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/postgres-data:/var/lib/postgresql/data
      - ./.docker/init-scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - fight-club-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fightclub"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: postgres:15-alpine
    container_name: fight-club-db-init
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./.docker/init-scripts/ensure-databases.sh:/ensure-databases.sh
    entrypoint: ["bash", "/ensure-databases.sh"]
    networks:
      - fight-club-net
    restart: on-failure

  kafka:
    image: apache/kafka:latest
    container_name: fight-club-kafka
    environment:
      # KRaft mode — no Zookeeper required
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9092:9092"
    volumes:
      - ./.docker/kafka-data:/var/lib/kafka/data
    networks:
      - fight-club-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  fight-club-net:
    driver: bridge
