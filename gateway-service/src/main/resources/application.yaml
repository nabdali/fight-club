spring:
  application:
    name: gateway-service

server:
  port: 8080

gateway:
  routes:
    - path: /users
      uri: http://localhost:8084
    - path: /characters
      uri: http://localhost:8082
    - path: /arena
      uri: http://localhost:8083
    - path: /api/leaderboard
      uri: http://localhost:8085

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

  # --- Tracing (désactivé jusqu'à ce qu'un collecteur OTLP soit en place) ---
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
